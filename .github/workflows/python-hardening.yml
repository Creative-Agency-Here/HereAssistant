name: Python hardening

on:
  push:
  pull_request:

jobs:
  python:
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.12"
          - os: windows-latest
            python: "3.12"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run --frozen ruff check .
      - run: uv run --frozen ruff format --check .
      - run: uv run --frozen pyright
      - if: runner.os != 'Windows'
        run: uv run --frozen pytest -q -p no:cacheprovider
      - if: runner.os == 'Windows'
        run: uv run --frozen pytest -vv -p no:cacheprovider --timeout=60 --timeout-method=thread
      - run: uv run --frozen python -m compileall -q bot.py manage.py chat.py core handlers providers utils webapp/api
      - run: uv lock --check
      - run: uv run --frozen python scripts/check_exception_ratchet.py
      - run: uv run --frozen python scripts/check_repository_hygiene.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp/front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webapp/front/package-lock.json
      - run: npm ci
      - run: npm run generate
