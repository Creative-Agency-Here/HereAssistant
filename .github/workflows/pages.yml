# Публикация лендинга (site/) на GitHub Pages.
#
# ⚠️ РАЗОВАЯ АКТИВАЦИЯ (иначе job падает «Get Pages site failed: Not Found»,
#    а enablement через встроенный GITHUB_TOKEN упирается в «Resource not
#    accessible by integration» — API-создание Pages запрещено политикой):
#      Settings → Pages → Build and deployment → Source: «GitHub Actions».
#    После этого пуш в site/** деплоится сам; либо Actions → этот workflow →
#    «Run workflow». Кастомный домен hereassistant.hereagency.ru на своём
#    nginx — CNAME сюда НЕ кладём, Pages выходит зеркалом на *.github.io.
name: Deploy landing to Pages

on:
  push:
    branches: [master]
    paths: ["site/**"]     # правки самого workflow НЕ триггерят прогон
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Параллельные деплои не нужны — держим один актуальный.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5   # без enablement — Pages включается вручную (см. шапку)
      - name: Upload site/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
